<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="레시피">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>레시피 아카이브</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
:root {
  --bg:#ffffff; --bg2:#f5f5f3; --bg3:#ebebea;
  --text:#1a1a18; --text2:#6b6b67; --text3:#a0a09c;
  --border:rgba(0,0,0,0.1); --border2:rgba(0,0,0,0.18);
  --r:14px; --rs:9px;
  --sb:env(safe-area-inset-bottom,0px); --st:env(safe-area-inset-top,0px);
  --th:60px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--text:#f2f2f0;--text2:#a0a09c;--text3:#6b6b67;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);}
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,'Apple SD Gothic Neo',BlinkMacSystemFont,'Noto Sans KR',sans-serif;}
button,input,select,textarea{font-family:inherit;color:var(--text);background:none;border:none;outline:none;}
button{cursor:pointer;}

#app{display:flex;flex-direction:column;height:100%;}
#scroller{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
#tabbar{display:flex;flex-shrink:0;background:var(--bg);border-top:0.5px solid var(--border);height:calc(var(--th) + var(--sb));padding-bottom:var(--sb);}
.tb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:10px;color:var(--text3);padding-top:4px;}
.tb.on{color:var(--text);}
.tb i{font-size:22px;}

.page{display:none;min-height:100%;}
.page.on{display:block;}
.phd{position:sticky;top:0;background:var(--bg);border-bottom:0.5px solid var(--border);z-index:9;padding:12px 16px;display:flex;align-items:center;gap:10px;}
.phd h1{font-size:17px;font-weight:600;flex:1;}
.pbd{padding:12px 16px 80px;}
.ibtn{width:36px;height:36px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--text2);}
.ibtn:active{background:var(--bg3);}

.sw{position:relative;margin-bottom:12px;}
.sw input{width:100%;background:var(--bg2);border-radius:11px;padding:10px 36px 10px 38px;font-size:15px;}
.sw .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:17px;color:var(--text3);pointer-events:none;}
.sw .sx{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:17px;color:var(--text3);display:none;}

.fl{margin-bottom:10px;}
.fl-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px;}
.pr{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
.pr::-webkit-scrollbar{display:none;}
.pill{font-size:12px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--border2);color:var(--text2);background:var(--bg);white-space:nowrap;flex-shrink:0;}
.pill.ai{background:#E1F5EE;color:#0F6E56;border-color:#5DCAA5;}
.cpill{font-size:12px;padding:5px 11px;border-radius:20px;border:0.5px solid var(--border);color:var(--text2);background:var(--bg2);white-space:nowrap;flex-shrink:0;}

.rc{font-size:13px;color:var(--text3);margin-bottom:12px;}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);padding:12px;}
.card:active{background:var(--bg2);}
.cc{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px;min-height:20px;}
.ce{font-size:26px;margin-bottom:6px;display:block;}
.cn{font-size:13px;font-weight:600;margin-bottom:3px;line-height:1.3;}
.cd{font-size:11px;color:var(--text2);line-height:1.4;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.cch{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px;}
.ch{font-size:10px;padding:2px 6px;border-radius:8px;background:var(--bg2);color:var(--text2);border:0.5px solid var(--border);}
.ch.m{background:#E1F5EE;color:#0F6E56;border-color:#5DCAA5;}
.cm{font-size:10px;color:var(--text3);display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.ytb{font-size:9px;padding:1px 5px;border-radius:6px;background:#FCEBEB;color:#A32D2D;border:0.5px solid #F09595;}
.lb{font-size:9px;padding:1px 5px;border-radius:6px;background:#EFF6FF;color:#1E40AF;border:0.5px solid #93C5FD;}
.empty{text-align:center;padding:60px 20px;color:var(--text3);grid-column:1/-1;}
.empty i{font-size:48px;display:block;margin-bottom:12px;}
.empty p{font-size:14px;line-height:1.6;}

.sbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;}
.sbg.on{display:block;}
.sht{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-radius:20px 20px 0 0;max-height:92vh;display:flex;flex-direction:column;z-index:51;transform:translateY(100%);transition:transform .32s cubic-bezier(.32,.72,0,1);}
.sht.on{transform:translateY(0);}
#editSBG{z-index:60;}
#editSheet{z-index:61;}
.sh{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto 0;flex-shrink:0;}
.shd{padding:14px 16px 10px;border-bottom:0.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;gap:10px;}
.shd h2{font-size:16px;font-weight:600;flex:1;}
.sb{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;}
.sf{padding:12px 16px;padding-bottom:calc(12px + var(--sb));border-top:0.5px solid var(--border);flex-shrink:0;}

.fg{margin-bottom:16px;}
.fg label{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:6px;}
.fi{width:100%;background:var(--bg2);border-radius:var(--rs);padding:11px 13px;font-size:15px;border:0.5px solid var(--border);}
.fi:focus{border-color:var(--border2);}
.ft{width:100%;background:var(--bg2);border-radius:var(--rs);padding:11px 13px;font-size:15px;border:0.5px solid var(--border);min-height:90px;resize:none;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fsel{width:100%;background:var(--bg2);border-radius:var(--rs);padding:11px 13px;font-size:15px;border:0.5px solid var(--border);appearance:none;-webkit-appearance:none;}

.cg{display:flex;flex-wrap:wrap;gap:7px;}
.ccb{display:none;}
.ccbl{font-size:13px;padding:6px 12px;border-radius:20px;border:0.5px solid var(--border2);color:var(--text2);background:var(--bg2);display:flex;align-items:center;gap:4px;}
.ccb:checked+.ccbl{background:var(--text);color:var(--bg);border-color:transparent;}

.bf{width:100%;background:var(--text);color:var(--bg);border-radius:var(--rs);padding:14px;font-size:16px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;}
.bf:active{opacity:.85;}
.bf:disabled{opacity:.4;}
.bo{width:100%;background:var(--bg2);color:var(--text);border-radius:var(--rs);padding:14px;font-size:15px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:8px;border:0.5px solid var(--border);}
.bo:active{background:var(--bg3);}
.bd{width:100%;background:#FCEBEB;color:#A32D2D;border-radius:var(--rs);padding:13px;font-size:15px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:7px;}
.bd:active{background:#F7C1C1;}
@media(prefers-color-scheme:dark){.bd{background:#2d1a1a;color:#F09595;}}

.atabs{display:flex;border:0.5px solid var(--border);border-radius:var(--rs);overflow:hidden;margin-bottom:20px;}
.atab{flex:1;padding:11px;font-size:14px;font-weight:500;color:var(--text2);background:var(--bg2);text-align:center;border-right:0.5px solid var(--border);}
.atab:last-child{border-right:none;}
.atab.on{background:var(--text);color:var(--bg);}
.ap{display:none;}
.ap.on{display:block;}

.abox{background:var(--bg2);border-radius:var(--rs);padding:14px;}
.aro{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--text2);}
.dots span{animation:blink 1.2s infinite;display:inline-block;}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
.pvbox{background:var(--bg2);border-radius:var(--rs);padding:14px;}
.pvn{font-size:15px;font-weight:600;margin-bottom:4px;}
.pvd{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:10px;}
.pvc{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.pvm{font-size:12px;color:var(--text3);display:flex;gap:12px;flex-wrap:wrap;}
.ebox{background:#FCEBEB;border:0.5px solid #F09595;border-radius:var(--rs);padding:12px;display:flex;gap:8px;}
.ebox p{font-size:13px;color:#A32D2D;line-height:1.5;}
.fbsep{height:0.5px;background:var(--border);margin:14px 0;}
.fbtitle{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:10px;}

.de{font-size:44px;text-align:center;margin-bottom:8px;}
.dt{font-size:20px;font-weight:700;margin-bottom:6px;}
.dc{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.dd{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:4px;}
.dm{font-size:12px;color:var(--text3);display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
.ds{margin-top:16px;}
.dst{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}
.ic{display:flex;flex-wrap:wrap;gap:6px;}
.ic span{font-size:13px;padding:5px 11px;border-radius:20px;background:var(--bg2);border:0.5px solid var(--border);}
.sl{list-style:none;}
.sl li{display:flex;gap:12px;font-size:14px;line-height:1.6;padding:10px 0;border-bottom:0.5px solid var(--border);}
.sl li:last-child{border-bottom:none;}
.sn{font-size:12px;font-weight:700;color:var(--text3);min-width:20px;padding-top:2px;}
.srcl{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:#1E40AF;text-decoration:none;margin-top:4px;}
@media(prefers-color-scheme:dark){.srcl{color:#85B7EB;}}

.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.sm{background:var(--bg2);border-radius:var(--rs);padding:14px;}
.sm .n{font-size:22px;font-weight:700;}
.sm .l{font-size:12px;color:var(--text2);margin-top:2px;}
.sc{background:var(--bg2);border-radius:var(--r);padding:16px;margin-bottom:12px;}
.br{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.bl{font-size:13px;min-width:70px;color:var(--text2);}
.bt{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.bf2{height:100%;background:var(--text);border-radius:3px;}
.bc{font-size:12px;color:var(--text3);min-width:20px;text-align:right;}
</style>
</head>
<body>
<div id="app">
  <div id="scroller">

    <!-- HOME -->
    <div id="pg-home" class="page on">
      <div class="phd">
        <h1>레시피 아카이브</h1>
        <button class="ibtn" onclick="toggleSearch()"><i class="ti ti-search"></i></button>
      </div>
      <div class="pbd">
        <div id="searchArea" style="display:none;margin-bottom:10px">
          <div class="sw">
            <i class="ti ti-search si"></i>
            <input id="searchInput" type="text" placeholder="재료 또는 요리 이름 검색" autocomplete="off">
            <i class="ti ti-x sx" id="clearX" onclick="clearSearch()"></i>
          </div>
        </div>
        <div class="fl">
          <div class="fl-label">카테고리</div>
          <div class="pr" id="catRow"></div>
        </div>
        <div class="fl">
          <div class="fl-label">재료</div>
          <div class="pr" id="ingRow"></div>
        </div>
        <div class="rc" id="rc"></div>
        <div class="grid" id="recipesGrid"></div>
      </div>
    </div>

    <!-- ADD -->
    <div id="pg-add" class="page">
      <div class="phd"><h1>레시피 추가</h1></div>
      <div class="pbd">
        <div class="atabs">
          <button class="atab on" onclick="switchTab('link')"><i class="ti ti-sparkles"></i> 링크 분석</button>
          <button class="atab" onclick="switchTab('manual')"><i class="ti ti-pencil"></i> 직접 입력</button>
        </div>
        <div id="ap-link" class="ap on">
          <div class="fg">
            <label>레시피 링크</label>
            <div style="display:flex;gap:8px">
              <input id="linkInput" type="url" class="fi" placeholder="유튜브, 블로그, 레시피 사이트 URL" style="flex:1">
              <button id="analyzeBtn" onclick="analyzeLink()" style="background:var(--text);color:var(--bg);border-radius:var(--rs);padding:0 16px;font-size:14px;font-weight:600;white-space:nowrap;flex-shrink:0">분석</button>
            </div>
          </div>
          <div id="analyzeState"></div>
          <div id="saveLinkRow" style="display:none;margin-top:14px">
            <button class="bf" onclick="saveFromLink()"><i class="ti ti-device-floppy"></i> 저장하기</button>
          </div>
        </div>
        <div id="ap-manual" class="ap">
          <div class="fr">
            <div class="fg"><label>이모지</label><input id="mEmoji" type="text" class="fi" placeholder="🍳" maxlength="2"></div>
            <div class="fg"><label>요리 이름</label><input id="mName" type="text" class="fi" placeholder="계란볶음밥"></div>
          </div>
          <div class="fg"><label>설명</label><input id="mDesc" type="text" class="fi" placeholder="한 줄 소개"></div>
          <div class="fg"><label>재료 (쉼표 구분)</label><input id="mIngredients" type="text" class="fi" placeholder="계란, 밥, 파, 간장"></div>
          <div class="fr">
            <div class="fg"><label>조리 시간</label><input id="mTime" type="text" class="fi" placeholder="20분"></div>
            <div class="fg"><label>난이도</label><select id="mDiff" class="fsel"><option>쉬움</option><option>보통</option><option>어려움</option></select></div>
          </div>
          <div class="fg"><label>카테고리</label><div class="cg" id="manualCatGrid"></div></div>
          <div class="fg"><label>조리 순서</label><textarea id="mSteps" class="ft" placeholder="1. 팬에 기름을 두르고&#10;2. 계란을 넣고"></textarea></div>
          <button class="bf" onclick="saveManual()"><i class="ti ti-device-floppy"></i> 저장하기</button>
        </div>
      </div>
    </div>

    <!-- STATS -->
    <div id="pg-stats" class="page">
      <div class="phd"><h1>통계</h1></div>
      <div class="pbd" id="statsContent"></div>
    </div>

  </div>

  <!-- TAB BAR -->
  <div id="tabbar">
    <button class="tb on" id="tb-home" onclick="goTab('home')"><i class="ti ti-books"></i>아카이브</button>
    <button class="tb" id="tb-add" onclick="goTab('add')"><i class="ti ti-circle-plus"></i>추가</button>
    <button class="tb" id="tb-stats" onclick="goTab('stats')"><i class="ti ti-chart-bar"></i>통계</button>
  </div>
</div>

<!-- DETAIL SHEET -->
<div id="detailSBG" class="sbg" onclick="closeDetail()"></div>
<div id="detailSheet" class="sht">
  <div class="sh"></div>
  <div class="shd"><h2>레시피 상세</h2><button class="ibtn" onclick="closeDetail()"><i class="ti ti-x"></i></button></div>
  <div class="sb" id="detailBody"></div>
</div>

<!-- EDIT SHEET -->
<div id="editSBG" class="sbg" onclick="closeEdit()"></div>
<div id="editSheet" class="sht">
  <div class="sh"></div>
  <div class="shd"><h2>레시피 수정</h2><button class="ibtn" onclick="closeEdit()"><i class="ti ti-x"></i></button></div>
  <div class="sb">
    <div class="fr">
      <div class="fg"><label>이모지</label><input id="eEmoji" type="text" class="fi" maxlength="2"></div>
      <div class="fg"><label>요리 이름</label><input id="eName" type="text" class="fi"></div>
    </div>
    <div class="fg"><label>설명</label><input id="eDesc" type="text" class="fi"></div>
    <div class="fg"><label>재료 (쉼표 구분)</label><input id="eIngredients" type="text" class="fi"></div>
    <div class="fr">
      <div class="fg"><label>조리 시간</label><input id="eTime" type="text" class="fi"></div>
      <div class="fg"><label>난이도</label><select id="eDiff" class="fsel"><option>쉬움</option><option>보통</option><option>어려움</option></select></div>
    </div>
    <div class="fg"><label>카테고리</label><div class="cg" id="editCatGrid"></div></div>
    <div class="fg"><label>조리 순서</label><textarea id="eSteps" class="ft" style="min-height:120px"></textarea></div>
  </div>
  <div class="sf">
    <button class="bf" onclick="saveEdit()"><i class="ti ti-device-floppy"></i> 수정 완료</button>
  </div>
</div>

<script>
const SK = 'recipe_archive_pwa_v1';
let recipes = [], sq = '', atag = '', acat = '', pending = null, editId = null;

const CATS = [
  {id:'korean',  l:'한식',     e:'🇰🇷',c:'#FAECE7',t:'#993C1D',b:'#F0997B'},
  {id:'chinese', l:'중식',     e:'🥡', c:'#FEF3C7',t:'#92400E',b:'#FCD34D'},
  {id:'western', l:'양식',     e:'🍝', c:'#EFF6FF',t:'#1E40AF',b:'#93C5FD'},
  {id:'japanese',l:'일식',     e:'🍱', c:'#F5F3FF',t:'#5B21B6',b:'#C4B5FD'},
  {id:'meal',    l:'식사 요리',e:'🍽️',c:'#F0FDF4',t:'#166534',b:'#86EFAC'},
  {id:'quick',   l:'간단 요리',e:'⚡', c:'#FFFBEB',t:'#92400E',b:'#FCD34D'},
  {id:'mealprep',l:'밀프렙',   e:'📦', c:'#F0F9FF',t:'#075985',b:'#7DD3FC'},
  {id:'snack',   l:'술안주',   e:'🍺', c:'#FDF2F8',t:'#831843',b:'#F9A8D4'},
  {id:'diet',    l:'다이어트', e:'🥗', c:'#ECFDF5',t:'#065F46',b:'#6EE7B7'},
  {id:'noodle',  l:'면 요리',  e:'🍜', c:'#FFF7ED',t:'#9A3412',b:'#FDBA74'},
  {id:'party',   l:'파티 요리',e:'🎉', c:'#FAF5FF',t:'#6B21A8',b:'#D8B4FE'},
  {id:'dessert', l:'디저트',   e:'🍰', c:'#FFF1F2',t:'#9F1239',b:'#FDA4AF'},
];

const DEFS = [
  {id:1,emoji:'🍳',name:'계란볶음밥',desc:'냉장고 속 남은 재료로 뚝딱 만드는 초간단 볶음밥',ingredients:['계란','밥','파','간장','참기름','마늘'],time:'15분',diff:'쉬움',categories:['korean','quick','meal'],steps:['찬밥을 준비한다.','파와 마늘을 잘게 썬다.','팬에 기름을 두르고 마늘을 볶는다.','계란을 스크램블한다.','밥과 간장·참기름으로 간한다.','파를 넣고 마무리한다.'],source:null,isYt:false},
  {id:2,emoji:'🥘',name:'순두부찌개',desc:'구수하고 얼큰한 한 그릇 뚝배기 요리',ingredients:['순두부','조개','대파','고춧가루','계란','멸치육수'],time:'20분',diff:'보통',categories:['korean','meal'],steps:['멸치육수를 끓인다.','고춧가루와 마늘을 볶는다.','조개를 넣는다.','순두부를 넣고 끓인다.','계란을 풀어 마무리한다.'],source:null,isYt:false},

// Storage: localStorage only (works on GitHub Pages)
function lsGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }

function loadData(){
  try{
    const v = lsGet(SK);
    if(v){
      const p = JSON.parse(v);
      if(Array.isArray(p) && p.length > 0){ recipes = p; return; }
    }
  }catch(e){}
  recipes = JSON.parse(JSON.stringify(DEFS));
  saveData();
}
function saveData(){ lsSet(SK, JSON.stringify(recipes)); }

function getCat(id){ return CATS.find(c=>c.id===id); }
function cpHtml(id, sm){
  const c = getCat(id); if(!c) return '';
  const sz = sm ? 'font-size:10px;padding:2px 6px' : 'font-size:12px;padding:4px 10px';
  return `<span style="${sz};border-radius:20px;background:${c.c};color:${c.t};border:0.5px solid ${c.b}">${c.e} ${c.l}</span>`;
}

function topIng(){
  const m={};
  recipes.forEach(r=>r.ingredients.forEach(i=>{m[i]=(m[i]||0)+1;}));
  return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,10).map(e=>e[0]);
}

function render(){
  const q = sq.trim().toLowerCase();
  const terms = q ? q.split(/[\s,]+/).filter(Boolean) : [];
  let filtered = recipes;
  if(terms.length) filtered = filtered.filter(r=>terms.some(t=>r.ingredients.some(i=>i.toLowerCase().includes(t))||r.name.toLowerCase().includes(t)));
  if(atag) filtered = filtered.filter(r=>r.ingredients.includes(atag));
  if(acat) filtered = filtered.filter(r=>(r.categories||[]).includes(acat));

  document.getElementById('catRow').innerHTML = CATS.map(c=>{
    const on = acat===c.id;
    const st = on ? `background:${c.c};color:${c.t};border-color:${c.b};font-weight:600` : '';
    return `<span class="cpill" style="${st}" onclick="toggleCat('${c.id}')">${c.e} ${c.l}</span>`;
  }).join('');

  document.getElementById('ingRow').innerHTML = topIng().map(t=>
    `<span class="pill${atag===t?' ai':''}" onclick="toggleTag('${t}')">${t}</span>`
  ).join('');

  document.getElementById('rc').textContent = (q||atag||acat) ? `${filtered.length}개 레시피 검색됨` : `전체 ${recipes.length}개`;

  const grid = document.getElementById('recipesGrid');
  if(!filtered.length){
    grid.innerHTML = `<div class="empty"><i class="ti ti-chef-hat"></i><p>검색된 레시피가 없어요.<br>추가 탭에서 레시피를 추가해보세요!</p></div>`;
    return;
  }
  grid.innerHTML = filtered.map(r=>{
    const cats = (r.categories||[]).slice(0,2).map(c=>cpHtml(c,true)).join('');
    const chips = r.ingredients.slice(0,4).map(i=>{
      const m2 = terms.some(t=>i.toLowerCase().includes(t))||(atag&&i===atag);
      return `<span class="ch${m2?' m':''}">${i}</span>`;
    }).join('') + (r.ingredients.length>4?`<span class="ch">+${r.ingredients.length-4}</span>`:'');
    const badge = r.isYt?'<span class="ytb">YouTube</span>':r.source?'<span class="lb">링크</span>':'';
    return `<div class="card" onclick="openDetail(${r.id})">
      <div class="cc">${cats}</div>
      <span class="ce">${r.emoji}</span>
      <div class="cn">${r.name}</div>
      <div class="cd">${r.desc||''}</div>
      <div class="cch">${chips}</div>
      <div class="cm"><span><i class="ti ti-clock"></i> ${r.time}</span><span>${r.diff}</span>${badge}</div>
    </div>`;
  }).join('');
}

function toggleTag(t){ atag=atag===t?'':t; render(); }
function toggleCat(c){ acat=acat===c?'':c; render(); }

let searchOn = false;
function toggleSearch(){
  searchOn = !searchOn;
  document.getElementById('searchArea').style.display = searchOn ? 'block' : 'none';
  if(searchOn) document.getElementById('searchInput').focus();
  else clearSearch();
}
function clearSearch(){
  sq=''; document.getElementById('searchInput').value='';
  document.getElementById('clearX').style.display='none'; render();
}
document.getElementById('searchInput').addEventListener('input', function(){
  sq = this.value;
  document.getElementById('clearX').style.display = sq ? 'block' : 'none';
  render();
});

function goTab(t){
  ['home','add','stats'].forEach(p=>{
    document.getElementById('pg-'+p).classList.toggle('on', p===t);
    document.getElementById('tb-'+p).classList.toggle('on', p===t);
  });
  document.getElementById('scroller').scrollTop = 0;
  if(t==='stats') renderStats();
  if(t==='add') resetAdd();
}

function switchTab(t){
  document.querySelectorAll('.atab').forEach((el,i)=>el.classList.toggle('on',(i===0&&t==='link')||(i===1&&t==='manual')));
  document.getElementById('ap-link').classList.toggle('on', t==='link');
  document.getElementById('ap-manual').classList.toggle('on', t==='manual');
}

function resetAdd(){
  document.getElementById('linkInput').value='';
  document.getElementById('analyzeState').innerHTML='';
  document.getElementById('saveLinkRow').style.display='none';
  pending=null;
  ['mEmoji','mName','mDesc','mIngredients','mTime','mSteps'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.value='';
  });
  buildCBs('manualCatGrid',[]);
}

function buildCBs(cid, sel){
  const el=document.getElementById(cid); if(!el) return;
  el.innerHTML=CATS.map(c=>
    `<span><input type="checkbox" class="ccb" id="cb_${cid}_${c.id}" value="${c.id}"${(sel||[]).includes(c.id)?' checked':''}><label class="ccbl" for="cb_${cid}_${c.id}">${c.e} ${c.l}</label></span>`
  ).join('');
}
function getCBs(cid){
  return [...document.querySelectorAll(`#${cid} input:checked`)].map(el=>el.value);
}

function ytId(url){ const m=url.match(/(?:v=|youtu\.be\/)([A-Za-z0-9_-]{11})/); return m?m[1]:null; }
function isYt(url){ return /youtube\.com|youtu\.be/.test(url); }

function setAnalyzing(msg){
  document.getElementById('analyzeState').innerHTML=`<div class="abox"><div class="aro"><i class="ti ti-loader" style="font-size:18px"></i><span>${msg}<span class="dots"><span>.</span><span>.</span><span>.</span></span></span></div></div>`;
}

function pvHtml(r){
  const chips=(r.ingredients||[]).map(i=>`<span class="ch" style="font-size:12px">${i}</span>`).join('');
  const cats=(r.categories||[]).map(c=>cpHtml(c,true)).join('');
  return `<div class="pvbox">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="font-size:24px">${r.emoji||'🍽️'}</span><div class="pvn">${r.name||''}</div></div>
    <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">${cats}</div>
    <div class="pvd">${r.desc||''}</div>
    <div class="pvc">${chips}</div>
    <div class="pvm"><span><i class="ti ti-clock"></i> ${r.time||'-'}</span><span>${r.diff||'-'}</span></div>
  </div>`;
}

function showFallback(partial){
  document.getElementById('analyzeState').innerHTML += `
  <div class="fbsep"></div>
  <div class="fbtitle"><i class="ti ti-edit"></i> 직접 보완해주세요</div>
  <div class="fr" style="margin-bottom:10px">
    <div><label style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;display:block;margin-bottom:5px">요리 이름</label><input type="text" class="fi" id="fb_name" value="${partial.name||''}" placeholder="요리 이름"></div>
    <div><label style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;display:block;margin-bottom:5px">이모지</label><input type="text" class="fi" id="fb_emoji" value="${partial.emoji||''}" maxlength="2" placeholder="🍽️"></div>
  </div>
  <div style="margin-bottom:10px"><label style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;display:block;margin-bottom:5px">재료 (쉼표 구분)</label><input type="text" class="fi" id="fb_ing" value="${(partial.ingredients||[]).join(', ')}" placeholder="재료1, 재료2"></div>
  <div style="margin-bottom:10px"><label style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;display:block;margin-bottom:5px">카테고리</label><div class="cg" id="fb_cats"></div></div>
  <button class="bo" style="margin-top:10px" onclick="applyFB()">미리보기 적용 →</button>`;
  buildCBs('fb_cats', partial.categories||[]);
}

function applyFB(){
  const name=document.getElementById('fb_name').value.trim();
  const ingredients=document.getElementById('fb_ing').value.split(',').map(s=>s.trim()).filter(Boolean);
  if(!name||!ingredients.length){alert('요리 이름과 재료는 필수입니다.');return;}
  pending={...pending,name,emoji:document.getElementById('fb_emoji').value||'🍽️',ingredients,categories:getCBs('fb_cats')};
  document.getElementById('analyzeState').innerHTML=pvHtml(pending);
  document.getElementById('saveLinkRow').style.display='block';
}

const CLABELS = CATS.map(c=>`"${c.id}"=${c.l}`).join(', ');

async function analyzeLink(){
  const url=document.getElementById('linkInput').value.trim(); if(!url) return;
  const btn=document.getElementById('analyzeBtn');
  btn.disabled=true; document.getElementById('saveLinkRow').style.display='none'; pending=null;
  setAnalyzing(isYt(url)?'유튜브 영상 분석 중':'링크 분석 중');
  const vid=ytId(url);
  const sys=`레시피 분석 전문가입니다. "categories"는 다음 중 해당하는 것 모두(배열): ${CLABELS}\nJSON만 반환: {"emoji":"이모지","name":"요리이름","desc":"설명2~3문장","ingredients":["재료"],"time":"시간","diff":"쉬움 또는 보통 또는 어려움","categories":["id"],"steps":["순서"]}`;
  const usr=vid?`유튜브 ID:${vid} URL:${url}\n웹 검색으로 레시피를 찾아 JSON만 반환하세요.`:`URL:${url}\n레시피를 분석해 JSON만 반환하세요.`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,tools:[{type:'web_search_20250305',name:'web_search'}],system:sys,messages:[{role:'user',content:usr}]})});
    const data=await res.json();
    const tb=data.content&&data.content.find(b=>b.type==='text');
    if(!tb) throw new Error('no text');
    let js=tb.text.trim().replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
    const m=js.match(/\{[\s\S]*\}/); if(!m) throw new Error('no json');
    const recipe=JSON.parse(m[0]);
    if(!recipe.name||!recipe.ingredients) throw new Error('missing fields');
    pending={...recipe,id:Date.now(),source:url,isYt:isYt(url),categories:recipe.categories||[]};
    document.getElementById('analyzeState').innerHTML=pvHtml(pending);
    document.getElementById('saveLinkRow').style.display='block';
  }catch(e){
    pending={id:Date.now(),source:url,isYt:isYt(url),steps:[],categories:[]};
    document.getElementById('analyzeState').innerHTML=`<div class="ebox"><i class="ti ti-alert-circle" style="font-size:18px;color:#A32D2D;flex-shrink:0;margin-top:1px"></i><p>자동 분석에 실패했어요.<br>아래에 직접 입력해주세요.</p></div>`;
    showFallback({});
  }
  btn.disabled=false;
}
document.getElementById('linkInput').addEventListener('keydown',function(e){if(e.key==='Enter')analyzeLink();});

function saveFromLink(){
  if(!pending||!pending.name||(pending.ingredients||[]).length===0){alert('요리 이름과 재료는 필수입니다.');return;}
  recipes.unshift(pending); saveData(); resetAdd(); goTab('home');
}

function saveManual(){
  const name=document.getElementById('mName').value.trim();
  const ings=document.getElementById('mIngredients').value.split(',').map(s=>s.trim()).filter(Boolean);
  if(!name||!ings.length){alert('이름과 재료는 필수입니다.');return;}
  const steps=document.getElementById('mSteps').value.trim().split('\n').map(s=>s.replace(/^\d+\.\s*/,'').trim()).filter(Boolean);
  recipes.unshift({id:Date.now(),emoji:document.getElementById('mEmoji').value||'🍽️',name,desc:document.getElementById('mDesc').value||'',ingredients:ings,time:document.getElementById('mTime').value||'-',diff:document.getElementById('mDiff').value,categories:getCBs('manualCatGrid'),steps:steps.length?steps:['레시피 준비중'],source:null,isYt:false});
  saveData(); resetAdd(); goTab('home');
}

function openDetail(id){
  const r=recipes.find(x=>x.id===id); if(!r) return;
  const cats=(r.categories||[]).map(c=>cpHtml(c,false)).join('');
  const chips=r.ingredients.map(i=>`<span>${i}</span>`).join('');
  const steps=(r.steps||[]).map((s,i)=>`<li><span class="sn">${i+1}</span><span>${s}</span></li>`).join('');
  const src=r.source?`<a href="${r.source}" class="srcl" target="_blank"><i class="ti ti-external-link"></i> 원본 ${r.isYt?'유튜브':'링크'} 보기</a>`:'';
  document.getElementById('detailBody').innerHTML=`
    <div class="de">${r.emoji}</div>
    <div class="dt">${r.name}</div>
    <div class="dc">${cats}</div>
    <div class="dd">${r.desc||''}</div>${src}
    <div class="dm"><span><i class="ti ti-clock"></i> ${r.time}</span><span>${r.diff}</span></div>
    <div class="ds"><div class="dst">재료</div><div class="ic">${chips}</div></div>
    ${steps?`<div class="ds"><div class="dst">조리 순서</div><ol class="sl">${steps}</ol></div>`:''}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:24px">
      <button class="bo" onclick="openEdit(${r.id})"><i class="ti ti-pencil"></i> 수정</button>
      <button class="bd" onclick="deleteRecipe(${r.id})"><i class="ti ti-trash"></i> 삭제</button>
    </div>`;
  document.getElementById('detailSBG').classList.add('on');
  document.getElementById('detailSheet').classList.add('on');
}
function closeDetail(){
  document.getElementById('detailSBG').classList.remove('on');
  document.getElementById('detailSheet').classList.remove('on');
}

function deleteRecipe(id){
  if(!confirm('이 레시피를 삭제할까요?')) return;
  recipes=recipes.filter(r=>r.id!==id); saveData(); closeDetail(); render();
}

function openEdit(id){
  const r=recipes.find(x=>x.id===id); if(!r) return;
  editId=id;
  document.getElementById('eEmoji').value=r.emoji||'';
  document.getElementById('eName').value=r.name||'';
  document.getElementById('eDesc').value=r.desc||'';
  document.getElementById('eIngredients').value=(r.ingredients||[]).join(', ');
  document.getElementById('eTime').value=r.time||'';
  document.getElementById('eDiff').value=r.diff||'보통';
  document.getElementById('eSteps').value=(r.steps||[]).join('\n');
  buildCBs('editCatGrid', r.categories||[]);
  document.getElementById('editSBG').classList.add('on');
  document.getElementById('editSheet').classList.add('on');
}
function closeEdit(){
  document.getElementById('editSBG').classList.remove('on');
  document.getElementById('editSheet').classList.remove('on');
  editId=null;
}
function saveEdit(){
  const name=document.getElementById('eName').value.trim();
  const ings=document.getElementById('eIngredients').value.split(',').map(s=>s.trim()).filter(Boolean);
  if(!name||!ings.length){alert('이름과 재료는 필수입니다.');return;}
  const steps=document.getElementById('eSteps').value.trim().split('\n').map(s=>s.replace(/^\d+\.\s*/,'').trim()).filter(Boolean);
  const idx=recipes.findIndex(r=>r.id===editId); if(idx===-1) return;
  recipes[idx]={...recipes[idx],emoji:document.getElementById('eEmoji').value||'🍽️',name,desc:document.getElementById('eDesc').value||'',ingredients:ings,time:document.getElementById('eTime').value||'-',diff:document.getElementById('eDiff').value,categories:getCBs('editCatGrid'),steps:steps.length?steps:['레시피 준비중']};
  saveData(); closeEdit(); openDetail(editId); render();
}

function renderStats(){
  const total=recipes.length;
  const allI={};
  recipes.forEach(r=>r.ingredients.forEach(i=>{allI[i]=(allI[i]||0)+1;}));
  const topI=Object.entries(allI).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const cc={};
  CATS.forEach(c=>{cc[c.id]=0;});
  recipes.forEach(r=>(r.categories||[]).forEach(c=>{if(cc[c]!==undefined)cc[c]++;}));
  const mx=Math.max(...Object.values(cc),1);
  document.getElementById('statsContent').innerHTML=`
    <div class="sg">
      <div class="sm"><div class="n">${total}</div><div class="l">전체 레시피</div></div>
      <div class="sm"><div class="n">${recipes.filter(r=>r.source).length}</div><div class="l">링크 저장</div></div>
      <div class="sm"><div class="n">${recipes.filter(r=>(r.categories||[]).includes('quick')).length}</div><div class="l">간단 요리</div></div>
      <div class="sm"><div class="n">${Object.keys(allI).length}</div><div class="l">등록된 재료 수</div></div>
    </div>
    <div class="sc">
      <div class="dst" style="margin-bottom:12px">카테고리별 레시피</div>
      ${CATS.map(c=>`<div class="br"><div class="bl">${c.e} ${c.l}</div><div class="bt"><div class="bf2" style="width:${Math.round(cc[c.id]/mx*100)}%"></div></div><div class="bc">${cc[c.id]}</div></div>`).join('')}
    </div>
    ${topI.length?`<div class="sc"><div class="dst" style="margin-bottom:12px">자주 쓰는 재료 TOP 5</div>${topI.map((e,i)=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--border);font-size:14px"><span><span style="color:var(--text3);margin-right:10px">${i+1}</span>${e[0]}</span><span style="color:var(--text2)">${e[1]}개</span></div>`).join('')}</div>`:''}`;
}

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));
}

loadData();
buildCBs('manualCatGrid',[]);
render();
</script>
